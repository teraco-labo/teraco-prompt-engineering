<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Engineering Techniques — TERACO</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Helvetica Neue', Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif;
  background: #f5f6fa;
  color: #1a1a2e;
  padding: 32px 20px 60px;
  min-height: 100vh;
}

.header { text-align: center; margin-bottom: 36px; }
.header h1 { font-size: 1.45rem; font-weight: 800; color: #1a1a2e; letter-spacing: 0.02em; }
.header .sub { font-size: 0.75rem; color: #888; margin-top: 5px; }
.header .hint { font-size: 0.72rem; color: #aaa; margin-top: 3px; }

.cat-label {
  grid-column: 1 / -1;
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #888;
  padding: 10px 0 6px;
  border-bottom: 2px solid #e8e8f0;
  margin-bottom: 4px;
}

.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; max-width: 900px; margin: 0 auto; }

.card {
  background: #fff;
  border: 1.5px solid #e8e8f0;
  border-radius: 14px;
  padding: 16px 16px 13px;
  cursor: pointer;
  transition: border-color 0.18s, box-shadow 0.18s, transform 0.15s;
}
.card:hover { border-color: #6c63ff; box-shadow: 0 4px 18px rgba(108,99,255,0.12); transform: translateY(-2px); }
.card.open { border-color: #6c63ff; background: #faf9ff; }
.card .num { font-size: 0.6rem; color: #ccc; font-weight: 700; letter-spacing: 0.1em; margin-bottom: 4px; }
.card .en  { font-size: 0.82rem; font-weight: 800; color: #1a1a2e; line-height: 1.35; margin-bottom: 3px; }
.card .kana { font-size: 0.65rem; color: #aaa; margin-bottom: 8px; line-height: 1.4; }
.card .desc { font-size: 0.7rem; color: #555; line-height: 1.6; }
.tag {
  display: inline-block; font-size: 0.58rem; padding: 3px 10px;
  border-radius: 99px; margin-top: 10px; font-weight: 700; letter-spacing: 0.04em;
}
.t-basic  { background: #e8faf2; color: #27ae60; }
.t-core   { background: #e8f0ff; color: #3a7bd5; }
.t-reason { background: #f0ecff; color: #6c63ff; }
.t-struct { background: #fffbe8; color: #e0a800; }
.t-adv    { background: #fff0f3; color: #e05c6f; }
.t-image  { background: #fce8ff; color: #a63dc7; }
.t-course { background: #fff4e0; color: #e07b00; }

.panel {
  display: none; grid-column: 1 / -1;
  background: #fff; border: 1.5px solid #6c63ff;
  border-radius: 16px; padding: 28px 30px;
  animation: fadeIn 0.2s ease;
}
.panel.show { display: block; }
@keyframes fadeIn { from { opacity:0; transform: translateY(-6px); } to { opacity:1; transform: translateY(0); } }

.p-en   { font-size: 1.1rem; font-weight: 800; color: #1a1a2e; }
.p-kana { font-size: 0.72rem; color: #aaa; margin: 3px 0 14px; }

/* 提唱者バッジ */
.p-author {
  display: flex; align-items: flex-start; gap: 10px;
  background: #f5f6fa; border-radius: 10px; padding: 12px 16px; margin-bottom: 20px;
}
.p-author-icon { font-size: 1rem; margin-top: 1px; flex-shrink: 0; }
.p-author-label { font-size: 0.58rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #aaa; margin-bottom: 4px; }
.p-author-name  { font-size: 0.78rem; font-weight: 700; color: #1a1a2e; margin-bottom: 2px; }
.p-author-kana  { font-size: 0.68rem; color: #6c63ff; margin-bottom: 4px; }
.p-author-cite  { font-size: 0.68rem; color: #888; line-height: 1.6; }

.p-desc { font-size: 0.8rem; color: #333; line-height: 1.9; margin-bottom: 22px; }

.p-section-ttl {
  font-size: 0.62rem; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: #6c63ff; margin-bottom: 10px;
}

.example {
  background: #faf9ff; border-left: 3px solid #6c63ff; border-radius: 8px;
  padding: 14px 18px; font-size: 0.74rem; color: #333;
  white-space: pre-wrap; line-height: 1.85;
  font-family: 'Menlo', 'Courier New', monospace; margin-bottom: 24px;
}

/* テンプレート */
.template-box {
  background: #fafafe; border: 1.5px solid #e0deff;
  border-radius: 12px; padding: 20px 22px; margin-bottom: 4px;
}
.tmpl-intro { font-size: 0.72rem; color: #666; margin-bottom: 18px; line-height: 1.7; }
.template-field { margin-bottom: 14px; }
.template-field label {
  display: block; font-size: 0.65rem; font-weight: 700;
  color: #6c63ff; margin-bottom: 5px; letter-spacing: 0.04em;
}
.template-field .field-note {
  font-size: 0.62rem; color: #aaa; font-weight: 400; margin-left: 6px;
}
.template-field input,
.template-field textarea {
  width: 100%; border: 1.5px solid #e0deff; border-radius: 8px;
  padding: 9px 13px; font-size: 0.76rem; color: #1a1a2e;
  font-family: inherit; background: #fff; outline: none;
  transition: border-color 0.15s, box-shadow 0.15s; resize: vertical;
}
.template-field input:focus,
.template-field textarea:focus { border-color: #6c63ff; box-shadow: 0 0 0 3px rgba(108,99,255,0.08); }
.template-field textarea { min-height: 80px; }
.template-field textarea.main-field { min-height: 110px; font-size: 0.78rem; }

/* ボタン */
.btn-row { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
.preview-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: #f0eeff; color: #6c63ff; border: 1.5px solid #c4b8ff;
  border-radius: 8px; padding: 10px 22px; font-size: 0.74rem; font-weight: 700;
  cursor: pointer; transition: background 0.15s, transform 0.12s; font-family: inherit;
}
.preview-btn:hover { background: #e4dfff; transform: translateY(-1px); }
.copy-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: #6c63ff; color: #fff; border: none;
  border-radius: 8px; padding: 10px 22px; font-size: 0.74rem; font-weight: 700;
  cursor: pointer; transition: background 0.15s, transform 0.12s; font-family: inherit;
}
.copy-btn:hover { background: #5549e0; transform: translateY(-1px); }
.copy-btn.copied { background: #27ae60; }

/* プレビュー */
.prompt-preview { display: none; margin-top: 16px; background: #f0eeff; border: 1.5px solid #c4b8ff; border-radius: 10px; overflow: hidden; }
.prompt-preview.show { display: block; }
.prompt-preview-label {
  font-size: 0.62rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: #6c63ff; padding: 9px 16px 7px; border-bottom: 1px solid #ddd6ff;
}
.prompt-preview-text {
  padding: 14px 18px; font-size: 0.76rem; color: #1a1a2e;
  white-space: pre-wrap; line-height: 1.85;
  font-family: 'Menlo', 'Courier New', monospace;
}

@media (max-width: 640px) { .grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 400px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="header">
  <h1>🧠 Prompt Engineering Template<br><span style="font-size:0.75rem;color:#888;font-weight:600;letter-spacing:0;">プロンプトエンジニアリングテンプレート</span></h1>
  <p class="sub">論文・業界標準で定義された正式名称のみ掲載</p>
  <p class="hint">カードをクリックすると解説・提唱者・テンプレートが表示されます</p>
</div>

<div class="grid" id="grid"></div>

<script>
// AI講座テンプレートの末尾に付ける共通指示（スマホのホーム画面アプリ化）
const PWA_INSTRUCTION = `

【スマホのホーム画面に置けるアプリにしてください】
このアプリを、iPhoneでもAndroidスマホでも「ホーム画面に追加」すると、本物のアプリのように全画面で起動できるWebアプリ（PWA）にしてください。
・ホーム画面に追加するための設定ファイル（manifest）と、オフラインでも開ける仕組み（service worker）も一緒に作ってください。
・ホーム画面に表示されるアプリ名とアイコンも設定してください。
・スマホでもパソコンでも見やすいように、画面の大きさに合わせて表示が変わるデザイン（レスポンシブ）にしてください。`;

const cards = [
  // ─── 基本系 ───────────────────────────────────────
  {
    cat: "🟢  基本系",
    en: "Zero-Shot Prompting",
    kana: "ゼロショット・プロンプティング",
    tag: "t-basic", tagLabel: "基本",
    desc: "例を一切見せずに、指示だけでAIに動いてもらう",
    authorName: "Brown et al.",
    authorKana: "ブラウン ら",
    cite: "2020年 論文「Language Models are Few-Shot Learners」（GPT-3論文）",
    detail: "「ゼロショット」とは、お手本（ショット）をゼロ＝まったく見せずに指示だけで動かすやり方です。「これをやってください」と書くだけなので、最もシンプルで気軽に試せます。まず最初にこれを試して、うまくいかなければ次のFew-Shotに切り替えるのが基本の流れです。",
    ex: `【プロンプト例】
次の英語を、日本語に翻訳してください。

英語：「I love studying with my friends after school.」

━━━━━━━━━━━━━━━━━
【ポイント】
お手本（例）を一切見せず、指示だけで動かすのがゼロショット。
まず最初に試す出発点として使う。`,
    tmplIntro: "AIにやってほしいことを、そのまま自由に書いてください。お手本や例は不要です。",
    fields: [
      { label: "AIへの指示・依頼内容", note: "（自由に書いてOK）", type: "textarea", cls: "main-field", placeholder: "例：次の英語を日本語に翻訳してください。\n\n英語：「I love studying with my friends after school.」" },
    ],
    build: (v) => v[0]
  },
  {
    en: "Few-Shot Prompting",
    kana: "フューショット・プロンプティング",
    tag: "t-basic", tagLabel: "基本",
    desc: "「こんな感じで」と例を2〜3個見せてから本番をお願いする",
    authorName: "Brown et al.",
    authorKana: "ブラウン ら",
    cite: "2020年 論文「Language Models are Few-Shot Learners」（GPT-3論文）",
    detail: "「こういう感じでやってほしい」という例（ショット）を少数（フュー）見せてから本番の依頼をする手法です。例を2〜3セット見せるだけで、AIが出力のトーン・形式・言い回しをしっかり学んでくれます。「思ったのと違う」が起きやすい場面で特に効果的です。",
    ex: `【プロンプト例】
以下のルールで言葉を「敬語」に変えてください。

お手本①）元：「了解」
　　　　 変換後：「承知いたしました」

お手本②）元：「ちょっと待って」
　　　　 変換後：「少々お待ちください」

本番）元：「無理です」
　　 変換後：

━━━━━━━━━━━━━━━━━
【ポイント】
お手本（例）を見せることで、言い回しを思い通りに変えられる。`,
    tmplIntro: "「お手本（例）」を2つ書いてから、本番のお願いを書きましょう。例を見せるほどAIが意図を理解します。",
    fields: [
      { label: "どんな変換・作業をしてほしいか", note: "（ルールや目的）", type: "input", placeholder: "例：くだけた言葉を敬語に変える" },
      { label: "お手本①　変換前", note: "", type: "input", placeholder: "" },
      { label: "お手本①　変換後（こうしてほしい）", note: "", type: "input", placeholder: "" },
      { label: "お手本②　変換前", note: "", type: "input", placeholder: "" },
      { label: "お手本②　変換後（こうしてほしい）", note: "", type: "input", placeholder: "" },
      { label: "本番　実際に変換・処理してほしい内容", note: "（自由に書いてOK）", type: "textarea", cls: "main-field", placeholder: "" },
    ],
    build: (v) =>
`以下のルール・目的で対応してください。
ルール：${v[0]}

お手本①）
　変換前：「${v[1]}」
　変換後：「${v[2]}」

お手本②）
　変換前：「${v[3]}」
　変換後：「${v[4]}」

本番）
${v[5]}`
  },
  {
    en: "Role Prompting",
    kana: "ロール・プロンプティング（別名：Persona Prompting）",
    tag: "t-core", tagLabel: "コア",
    desc: "AIに「〇〇の専門家」という役割を与えて回答の質を上げる",
    authorName: "OpenAI / Anthropic",
    authorKana: "オープンエーアイ ／ アンソロピック",
    cite: "OpenAI・Anthropic 両社の公式ガイドラインで推奨 / 業界標準手法",
    detail: "最初に「あなたは〇〇の専門家です」と役割を設定するだけで、AIの回答がぐっと専門的になります。役職・経験年数・得意分野を具体的に書けば書くほど、その専門家らしい言葉遣いや視点で答えてくれます。最も多く使われている基本テクニックです。",
    ex: `【プロンプト例】
あなたは料理歴30年のベテラン主婦です。

冷蔵庫にキャベツと卵しかありません。
これだけで作れる、家族が喜ぶ
簡単な料理を3つ教えてください。

━━━━━━━━━━━━━━━━━
【ポイント】
役割を具体的に設定するほど
AIの答えが「その人らしい」内容になる。`,
    tmplIntro: "AIに演じてほしい役割を設定してから、実際にお願いしたいことを自由に書いてください。",
    fields: [
      { label: "AIに演じてほしい役割・肩書き", note: "（できるだけ具体的に）", type: "input", placeholder: "例：料理歴30年のベテラン主婦" },
      { label: "その専門家に聞きたいこと・やってほしいこと", note: "（自由に書いてOK）", type: "textarea", cls: "main-field", placeholder: "例：冷蔵庫にキャベツと卵しかありません。これで作れる簡単な料理を3つ教えてください。" },
      { label: "回答の形式（任意）", note: "（省略してもOK）", type: "input", placeholder: "例：箇条書きで3点　／　わかりやすい言葉で" },
    ],
    build: (v) =>
`あなたは${v[0]}です。

${v[1]}${v[2] ? "\n\n回答は" + v[2] + "でお願いします。" : ""}`
  },

  // ─── 推論強化系 ──────────────────────────────────
  {
    cat: "🔵  推論強化系",
    en: "Chain-of-Thought Prompting (CoT)",
    kana: "チェーン・オブ・ソート・プロンプティング",
    tag: "t-reason", tagLabel: "推論強化",
    desc: "「ステップで考えて」と一言加えるだけで推論の精度が上がる",
    authorName: "Wei et al.",
    authorKana: "ウェイ ら",
    cite: "2022年 論文「Chain-of-Thought Prompting Elicits Reasoning in LLMs」Google Brain",
    detail: "「ステップバイステップで考えてください」と一言加えるだけで、AIが思考プロセスを段階的に見せながら答えてくれます。2022年にGoogleのAI研究チームが発表。複雑な計画・分析・判断が必要なときに特に効果的です。「順番に考えて」「手順を示して」でも同じ効果があります。",
    ex: `【プロンプト例】
以下の問題について、ステップバイステップで
考えてから答えを出してください。

問題：友達の誕生日プレゼントを3,000円以内で選びたい。
何を買えばいいか？

ステップ1：相手の好み・趣味を整理する
ステップ2：候補をいくつか出してみる
ステップ3：その中から最適な1つに絞る

━━━━━━━━━━━━━━━━━
【ポイント】
「ステップで考えて」の一言を加えるだけで
答えの精度がグッと上がる。`,
    tmplIntro: "考えてほしいテーマや課題を書いてください。AIが順番に考えてから結論を出します。",
    fields: [
      { label: "考えてほしい課題・問い", note: "（自由に書いてOK）", type: "textarea", cls: "main-field", placeholder: "例：友達の誕生日プレゼントを3,000円以内で選びたい。何を買えばいい？" },
      { label: "ステップ数（任意）", note: "（省略すると自動で考えてくれます）", type: "input", placeholder: "例：3" },
    ],
    build: (v) =>
`以下の課題について、ステップバイステップで思考プロセスを示してから結論を出してください。

課題：${v[0]}${v[1] ? "\n\n※ステップは" + v[1] + "つで考えてください。" : ""}`
  },
  {
    en: "Self-Consistency",
    kana: "セルフ・コンシステンシー",
    tag: "t-reason", tagLabel: "推論強化",
    desc: "同じ問いを複数の視点で考えさせて、いちばん確からしい答えを選ぶ",
    authorName: "Wang et al.",
    authorKana: "ワン ら",
    cite: "2022年 論文「Self-Consistency Improves Chain of Thought Reasoning in LLMs」Google Brain",
    detail: "同じ問いを「複数の視点・角度」から独立して考えさせて、最も一貫性のある答えを選ばせる手法です。一つの回答だけでなく、複数の推論を比較することで精度が上がります。「本当にこれでいいのか確かめたい」「抜け漏れなく考えたい」ときに使いましょう。",
    ex: `【プロンプト例】
以下の問いを3つの異なる視点で
それぞれ独立して考えてください。

問い：「毎朝ちゃんと朝ごはんを食べたほうがいい理由は？」

視点A：健康の観点から
視点B：勉強・仕事への影響から
視点C：気持ち・気分への影響から

3つを比較して、最も説得力のある答えをまとめてください。

━━━━━━━━━━━━━━━━━
【ポイント】
複数の視点で考えさせて
一番一貫性のある答えを選ぶ。`,
    tmplIntro: "考えてほしい問いと、3つの視点を入力してください。視点を変えて比べることで精度が上がります。",
    fields: [
      { label: "考えてほしい問い・テーマ", note: "（自由に書いてOK）", type: "textarea", cls: "main-field", placeholder: "例：毎朝ちゃんと朝ごはんを食べたほうがいい理由は？" },
      { label: "視点 A", note: "（どんな角度から考えるか）", type: "input", placeholder: "例：健康の観点から" },
      { label: "視点 B", note: "", type: "input", placeholder: "例：勉強・仕事への影響から" },
      { label: "視点 C", note: "", type: "input", placeholder: "例：気持ち・気分への影響から" },
    ],
    build: (v) =>
`以下の問いを3つの異なる視点でそれぞれ独立して考えてください。

問い：「${v[0]}」

視点A：${v[1]}
視点B：${v[2]}
視点C：${v[3]}

3つを比較して、最も説得力のある結論をまとめてください。`
  },
  {
    en: "Tree of Thoughts (ToT)",
    kana: "ツリー・オブ・ソーツ",
    tag: "t-reason", tagLabel: "推論強化",
    desc: "アイデアを木の枝のように広げてから絞り込む発想法",
    authorName: "Yao et al.",
    authorKana: "ヤオ ら",
    cite: "2023年 論文「Tree of Thoughts: Deliberate Problem Solving with LLMs」Princeton大学 & Google",
    detail: "一本道で考えるのではなく、まず複数の方向性（枝）を広げてから、それぞれを評価して最良の枝を選んでいく手法です。Chain-of-Thoughtの進化版。創造的なアイデア出しや、複雑な戦略を考えるときに特に有効です。「広げてから絞る」思考法です。",
    ex: `【プロンプト例】
アイデアを木構造で広げてください。

テーマ：「夏休みに家族で行きたい場所」

① まず3つの大きな方向性（枝）を出す
　（例：自然 ／ 街・観光地 ／ 歴史を学べる場所）
② 各方向性から2つの具体的な場所（小枝）を出す
③ 全体を見渡して最も楽しそうな枝を選ぶ
④ 選んだ場所の魅力をくわしく説明する

━━━━━━━━━━━━━━━━━

function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none;';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); cb(); } catch(e) { alert('コピーできませんでした。プレビュー欄のテキストを手動で選択してください。'); }
  document.body.removeChild(ta);
}

const grid = document.getElementById('grid');
let openPanel = null, openCard = null;

cards.forEach((c, i) => {
  if (c.cat) {
    const lbl = document.createElement('div');
    lbl.className = 'cat-label';
    lbl.textContent = c.cat;
    grid.appendChild(lbl);
  }

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="num">${String(i + 1).padStart(2, '0')}</div>
    <div class="en">${c.en}</div>
    <div class="kana">${c.kana}</div>
    <div class="desc">${c.desc}</div>
    <span class="tag ${c.tag}">${c.tagLabel}</span>
  `;

  const fieldsHtml = c.fields.map((f, fi) => `
    <div class="template-field">
      <label>${f.label}${f.note ? `<span class="field-note">${f.note}</span>` : ''}</label>
      ${f.type === 'textarea'
        ? `<textarea data-fi="${fi}" class="${f.cls || ''}" placeholder="${f.placeholder}" rows="3"></textarea>`
        : `<input type="text" data-fi="${fi}" placeholder="${f.placeholder}">`
      }
    </div>
  `).join('');

  const panel = document.createElement('div');
  panel.className = 'panel';
  const authorHtml = c.cite ? `
    <div class="p-author">
      <div class="p-author-icon">📄</div>
      <div class="p-author-body">
        <div class="p-author-label">提唱者・出典</div>
        <div class="p-author-name">${c.authorName}</div>
        <div class="p-author-cite">${c.cite}</div>
      </div>
    </div>` : '';

  const exampleHtml = c.ex ? `
    <div class="p-section-ttl">実際のプロンプト例</div>
    <div class="example">${c.ex}</div>` : '';

  panel.innerHTML = `
    <div class="p-en">${c.en}</div>
    <div class="p-kana">${c.kana}</div>
    ${authorHtml}
    <div class="p-desc">${c.detail}</div>
    ${exampleHtml}
    <div class="p-section-ttl">コピペ用テンプレート</div>
    <div class="template-box">
      <p class="tmpl-intro">${c.tmplIntro}</p>
      ${fieldsHtml}
      <div class="btn-row">
        <button class="preview-btn" data-idx="${i}">👁 プロンプトを確認する</button>
        <button class="copy-btn" data-idx="${i}">📋 コピー</button>
      </div>
      <div class="prompt-preview">
        <div class="prompt-preview-label">生成されたプロンプト（確認してからコピーしてください）</div>
        <div class="prompt-preview-text"></div>
      </div>
    </div>
  `;

  card.addEventListener('click', () => {
    if (openPanel && openPanel !== panel) {
      openPanel.classList.remove('show');
      openCard.classList.remove('open');
    }
    if (panel.classList.contains('show')) {
      panel.classList.remove('show');
      card.classList.remove('open');
      openPanel = null; openCard = null;
    } else {
      panel.classList.add('show');
      card.classList.add('open');
      openPanel = panel; openCard = card;
      setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 60);
    }
  });

  function buildPrompt() {
    const inputs = panel.querySelectorAll('input[data-fi], textarea[data-fi]');
    const vals = Array.from(inputs).map(el => el.value.trim());
    return c.build(vals);
  }

  function showPreview() {
    const text = buildPrompt();
    const preview = panel.querySelector('.prompt-preview');
    const previewText = panel.querySelector('.prompt-preview-text');
    previewText.textContent = text;
    preview.classList.add('show');
    setTimeout(() => preview.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 60);
    return text;
  }

  panel.querySelector('.preview-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    showPreview();
  });

  panel.querySelector('.copy-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    const text = showPreview();
    const btn = e.currentTarget;
    function onCopied() {
      btn.textContent = '✅ コピーしました！';
      btn.classList.add('copied');
      setTimeout(() => { btn.innerHTML = '📋 コピー'; btn.classList.remove('copied'); }, 2500);
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(onCopied).catch(() => fallbackCopy(text, onCopied));
    } else {
      fallbackCopy(text, onCopied);
    }
  });

  grid.appendChild(card);
  grid.appendChild(panel);
});
</script>
</body>
</html>
